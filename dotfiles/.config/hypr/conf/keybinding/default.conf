# ! Follow the format defined by the Noctalia [keybind-cheatsheet](https://noctalia.dev/plugins/keybind-cheatsheet) plugin

$mainMod = SUPER
$ipc = qs -c noctalia-shell ipc call

# 1. APPLICATIONS
bind = $mainMod, K, exec, $ipc plugin:keybind-cheatsheet toggle #"Keybind cheatsheet"
bind = $mainMod, A, exec, $ipc launcher toggle #"Application launcher"
bind = $mainMod, RETURN, exec, $HOME/.config/singularity/default-apps/terminal.sh #"Terminal"
bind = $mainMod, F, exec, $HOME/.config/singularity/default-apps/file-manager.sh #"File manager"
bind = $mainMod, B, exec, $HOME/.config/singularity/default-apps/browser.sh #"Browser"
bind = $mainMod SHIFT, P, exec, $HOME/.config/singularity/default-apps/music.sh #"Music player"
bind = $mainMod, E, exec, $HOME/.config/singularity/default-apps/editor.sh #"Text editor"
bind = $mainMod SHIFT, M, exec, $HOME/.config/singularity/default-apps/mail.sh #"Email"
bind = $mainMod SHIFT, C, exec, $HOME/.config/singularity/default-apps/calculator.sh #"Calculator"
bind = , XF86Calculator, exec, $HOME/.config/singularity/default-apps/calculator.sh #"Calculator"
bind = , XF86Calendar, exec, $ipc calendar toggle #"Calendar"

# 2. SYSTEM ACTIONS
bind = $mainMod, BACKSPACE, exec, $ipc sessionMenu toggle #"Session menu"
bind = $mainMod, L, exec, $ipc lockScreen lock #"Lock"
bind = , XF86Lock, exec, $ipc lockScreen lock #"Lock"
bindel = , XF86MonBrightnessUp, exec, $ipc brightness increase #"Brightness up"
bindel = , XF86MonBrightnessDown, exec, $ipc brightness decrease #"Brightness down"

# 3. UTILITY
bind = $mainMod, V, exec, $ipc launcher clipboard #"Clipboard history"
bind = $mainMod SHIFT, E, exec, $ipc launcher emoji #"Emoji selector"
bind = $mainMod, P, exec, $ipc plugin:screenshot takeScreenshot region #"Screenshot region selector"
bind = , XF86SelectiveScreenshot, exec, $ipc plugin:screenshot takeScreenshot region #"Screenshot region selector"
bind = , Print, exec, $ipc plugin:screenshot takeScreenshot output #"Screenshot of current output"

# 4. MULTIMEDIA
bindl = , XF86AudioMute, exec, $ipc volume muteOutput #"Mute audio output"
bindel = , XF86AudioRaiseVolume, exec, $ipc volume increase #"Increase volume"
bindel = , XF86AudioLowerVolume, exec, $ipc volume decrease #"Decrease volume"
bindl = , XF86AudioPlay, exec, $ipc media playPause #"Play/pause toggle"
bindl = , XF86AudioPause, exec, $ipc media ause #"Pause track"
bindl = , XF86AudioNext, exec, $ipc media next #"Next track"
bindl = , XF86AudioPrev, exec, $ipc media previous #"Previous track"
bindl = , XF86AudioMicMute, exec, $ipc volume muteInput #"Mute microphone"

# 5. WORKSPACE ACTIONS
bind = $mainMod, right, workspace, +1 #"Move to next workspace"
bind = $mainMod, left, workspace, -1 #"Move to previouse workspace"
bind = $mainMod, down, workspace, empty #"Move to first empty workspace"
bind = $mainMod, 1, workspace, 1 #"Go to workspace 1"
bind = $mainMod, 2, workspace, 2 #"Go to workspace 2"
bind = $mainMod, 3, workspace, 3 #"Go to workspace 3"
bind = $mainMod, 4, workspace, 4 #"Go to workspace 4"
bind = $mainMod, 5, workspace, 5 #"Go to workspace 5"
bind = $mainMod, 6, workspace, 6 #"Go to workspace 6"
bind = $mainMod, 7, workspace, 7 #"Go to workspace 7"
bind = $mainMod, 8, workspace, 8 #"Go to workspace 8"
bind = $mainMod, 9, workspace, 9 #"Go to workspace 9"
bind = $mainMod, 0, workspace, 10 #"Go to workspace 10"

# 6. WINDOW ACTIONS
bind = $mainMod, Q, killactive #"Quit window"
binde = ALT, Tab, cyclenext #"Cycle windows on workspace"
binde = ALT, Tab, alterzorder, top
bind = $mainMod, up, fullscreen, 1 #"Maximize window"
bind = $mainMod SHIFT, up, fullscreen, 0 #"Fullscreen"
bind = $mainMod, T, togglefloating #"Toggle floating/tiling mode"
bind = $mainMod, S, layoutmsg, swapsplit #"Swap windows"
bindm = $mainMod, mouse:272, movewindow #"Drag window"
bindm = $mainMod, mouse:273, resizewindow #"Resize window"
bind = $mainMod SHIFT, right, movetoworkspace, +1 #"Move window to next workspace"
bind = $mainMod SHIFT, left, movetoworkspace, -1 #"Move window to previouse workspace"
bind = $mainMod SHIFT, down, movetoworkspace, empty #"Move window to first empty workspace"
bind = $mainMod SHIFT, 1, movetoworkspace, 1 #"Move window to workspace 1"
bind = $mainMod SHIFT, 2, movetoworkspace, 2 #"Move window to workspace 2"
bind = $mainMod SHIFT, 3, movetoworkspace, 3 #"Move window to workspace 3"
bind = $mainMod SHIFT, 4, movetoworkspace, 4 #"Move window to workspace 4"
bind = $mainMod SHIFT, 5, movetoworkspace, 5 #"Move window to workspace 5"
bind = $mainMod SHIFT, 6, movetoworkspace, 6 #"Move window to workspace 6"
bind = $mainMod SHIFT, 7, movetoworkspace, 7 #"Move window to workspace 7"
bind = $mainMod SHIFT, 8, movetoworkspace, 8 #"Move window to workspace 8"
bind = $mainMod SHIFT, 9, movetoworkspace, 9 #"Move window to workspace 9"
bind = $mainMod SHIFT, 0, movetoworkspace, 10 #"Move window to workspace 10"
