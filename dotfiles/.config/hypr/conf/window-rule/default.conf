layerrule {
  name = noctalia
  match:namespace = noctalia-background-.*$
  ignore_alpha = 0.5
  blur = true
  blur_popups = true
}

windowrule {
  name = ForceCurrentWorkspace
  match:class = .*
  workspace = +0
}

windowrule {
  name = gnome-calculator
  match:class = (org.gnome.Calculator)
  float = true
  center = true
  size = 700 600
}

windowrule {
  name = Picture-in-Picture
  match:title = ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$
  float = true
  pin = true
  center = true
}
